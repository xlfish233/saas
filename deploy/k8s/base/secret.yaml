apiVersion: v1
kind: Secret
metadata:
  name: erp-saas-secrets
type: Opaque
stringData:
  # These values should be overridden during deployment
  # DO NOT commit real credentials here
  database-url: "postgresql://placeholder_user:placeholder_password@postgres:5432/placeholder_db"
  jwt-private-key: |
    -----BEGIN RSA PRIVATE KEY-----
    # Replace with actual key
    -----END RSA PRIVATE KEY-----
  jwt-public-key: |
    -----BEGIN PUBLIC KEY-----
    # Replace with actual key
    -----END PUBLIC KEY-----
---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
type: Opaque
stringData:
  url: "postgresql://placeholder_user:placeholder_password@postgres:5432/placeholder_db"
  username: "placeholder_user"
  password: "placeholder_password"
