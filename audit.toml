# Ignore known vulnerabilities during development
# TODO: Review and update dependencies before production

[advisories]
ignore = [
    "RUSTSEC-2023-0071",  # rsa: Marvin Attack - no fix available
    "RUSTSEC-2025-0111",  # tokio-tar: PAX header parsing - testcontainers dependency
    "RUSTSEC-2025-0134",  # rustls-pemfile: unmaintained - testcontainers dependency
]
informational_warnings = ["unmaintained"]

[yanked]
enabled = true
update_index = true
