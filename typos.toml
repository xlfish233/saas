# Typos configuration
# See https://github.com/crate-ci/typos/blob/master/docs/reference.md

[files]
extend-exclude = [
    ".git/",
    "target/",
    "Cargo.lock",
]

[default]
extend-ignore-re = [
    # Hex strings
    "[0-9a-fA-F]{7,}",
    # UUIDs
    "[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}",
]

[default.extend-words]
# Common abbreviations that might be flagged
GRP = "GRP"
SER = "SER"
igs = "igs"
